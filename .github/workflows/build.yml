name: cmake-build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: IDA ${{ matrix.idasdk.version }} on ${{ matrix.os.label }}
    runs-on: ${{ matrix.os.label }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - label: ubuntu-24.04
            type: linux
            artifacts_suffix: "x86_64-Linux-built_on_Ubuntu_24.04"
          - label: ubuntu-22.04
            type: linux
            artifacts_suffix: "x86_64-Linux-built_on_Ubuntu_22.04"
          - label: macos-15
            type: macos
            artifacts_suffix: "universal-macOS"
          - label: windows-2025
            type: windows
            artifacts_suffix: "x86_64-Windows"

        idasdk:
          - version: "9.0"
            type: hcli
            hcli_tag: "release/9.0/sdk-and-utilities/idasdk90.zip"
            zip_filename: "idasdk90.zip"
            subdir: "idasdk90"
          - version: "9.1"
            type: hcli
            hcli_tag: "release/9.1/sdk-and-utilities/idasdk91.zip"
            zip_filename: "idasdk91.zip"
            subdir: "idasdk91"
          - version: "9.2"
            type: hcli
            hcli_tag: "release/9.2/sdk-and-utilities/idasdk92.zip"
            zip_filename: "idasdk92.zip"
            subdir: "src"
          - version: "9.3"
            type: oss
            repo_tag: "v9.3"
            subdir: "src"

    steps:
    - name: Checkout current repository
      uses: actions/checkout@v6

    - name: Checkout bindiff repository
      uses: actions/checkout@v6
      with:
        repository: google/bindiff
        ref: 156cc32a39863e8795fbbe05da113f005f72752b
        path: bindiff
        submodules: recursive

    - name: Checkout binexport repository
      uses: actions/checkout@v6
      with:
        repository: google/binexport
        ref: 644786690fcb6bcf6d42a76e7d8b65056176054d
        path: binexport
        submodules: recursive

    - name: Apply patch (bindiff)
      shell: bash
      working-directory: bindiff
      run: |
        git apply ../patches/bindiff-compile_abseil_mutexlock.patch
        git apply ../patches/bindiff-i64_matches_ida_exe.patch

    - name: Apply patch (binexport)
      shell: bash
      working-directory: binexport
      run: |
        git apply ../patches/binexport-cmake.patch

    - name: Setup uv (hcli)
      if: matrix.idasdk.type == 'hcli'
      uses: astral-sh/setup-uv@v7

    - name: Get idasdk (hcli)
      if: matrix.idasdk.type == 'hcli'
      shell: bash
      run: |
        mkdir idasdk
        uvx --from ida-hcli hcli --disable-updates download "${{ matrix.idasdk.hcli_tag }}"
        unzip -q "${{ matrix.idasdk.zip_filename }}" -d idasdk/
      env:
        HCLI_API_KEY: ${{ secrets.HCLI_API_KEY }}

    - name: Get idasdk (oss)
      if: matrix.idasdk.type == 'oss'
      uses: actions/checkout@v6
      with:
        repository: HexRaysSA/ida-sdk
        ref: ${{ matrix.idasdk.repo_tag }}
        path: idasdk
        submodules: recursive

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@3a6cbe35ba64df7ca70c51365c4aff65db9a9037  # v2.1.1
      with:
        cmake-version: '3.28.x'

    - name: Install ninja-build tool
      uses: aseprite/get-ninja@27788a2a3a1d6106713702d6741e4ee95f3cc10a

    - name: Enable Developer Command Prompt (Windows)
      if: matrix.os.type == 'windows'
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0

    - name: Enable mold linker (Linux)
      if: matrix.os.type == 'linux'
      uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878

    - name: Configure CMake
      shell: bash
      run: |
        mkdir -p build/out

        # Build universal binaries on macOS (both arm64 and x86_64)
        if [ "${{ matrix.os.type }}" = "macos" ]; then
          CMAKE_EXTRA_FLAGS="-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
        else
          CMAKE_EXTRA_FLAGS=""
        fi

        cmake -S bindiff -B build/out -G Ninja \
          "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}" \
          -DCMAKE_INSTALL_PREFIX=build/out \
          -DBINDIFF_BINEXPORT_DIR=binexport \
          "-DIdaSdk_ROOT_DIR=${PWD}/idasdk/${{ matrix.idasdk.subdir }}" \
          ${CMAKE_EXTRA_FLAGS}

    - name: Build
      working-directory: build/out
      shell: bash
      run: cmake --build . --config "${BUILD_TYPE}" --parallel 4

    - name: Test
      working-directory: build/out
      shell: bash
      run: ctest --build-config "${BUILD_TYPE}" --output-on-failure -R '^[A-Z]'

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: IDA_${{ matrix.idasdk.version }}-BinDiff-${{ matrix.os.artifacts_suffix }}
        path: |
          build/out/bindiff
          build/out/bindiff.exe
          build/out/ida/bindiff*
          build/out/tools/bindiff*

    - name: Configure CMake (binexport)
      shell: bash
      run: |
        # Build universal binaries on macOS (both arm64 and x86_64)
        if [ "${{ matrix.os.type }}" = "macos" ]; then
          CMAKE_EXTRA_FLAGS="-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
        else
          CMAKE_EXTRA_FLAGS=""
        fi

        cmake -S binexport -B build/out/_deps/binexport-build -G Ninja \
          "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}" \
          -DCMAKE_INSTALL_PREFIX=build/out/_deps/binexport-build \
          -DBINEXPORT_ENABLE_IDAPRO=ON \
          -DBINEXPORT_ENABLE_BINARYNINJA=ON \
          "-DIdaSdk_ROOT_DIR=${PWD}/idasdk/${{ matrix.idasdk.subdir }}" \
          ${CMAKE_EXTRA_FLAGS}

    - name: Build (binexport)
      working-directory: build/out/_deps/binexport-build
      shell: bash
      run: cmake --build . --config "${BUILD_TYPE}" --parallel 4

    - name: Test (binexport)
      working-directory: build/out/_deps/binexport-build
      shell: bash
      run: ctest --build-config "${BUILD_TYPE}" --output-on-failure -R '^[A-Z]'

    - name: Upload Build Artifacts (binexport)
      uses: actions/upload-artifact@v7
      with:
        name: IDA_${{ matrix.idasdk.version }}-BinExport-${{ matrix.os.artifacts_suffix }}
        path: |
          build/out/_deps/binexport-build/binaryninja/binexport*
          build/out/_deps/binexport-build/ida/binexport*
          build/out/_deps/binexport-build/tools/binexport2dump*
